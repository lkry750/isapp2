<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <script type="text/javascript" src="../lib/jquery.min.js"></script>
    <script type="text/javascript" src="../lib/osql.js"></script>

    <script>
        osql.requireLogin();//すべてのページに入れる．google認証をして，osql.connect()や，osql.getMe()を使えるようにしてくれる．

        $().ready(function() {
            init();
        });
        

        function init() {
            var username = sessionStorage.getItem('username');
            document.getElementById('welcome').innerHTML = 'ようこそ' + username + 'さん';
        }

        function buttonPressed() {
            var userid = sessionStorage.getItem('userid');
            location.href = 'update.html?userid=' + userid;
        }

        function buttonPressed2() {
            var userid = sessionStorage.getItem('userid');
            location.href = 'tweet.html?userid=' + userid;
        }
    </script>

</head>

<body>
    <h1>ユーザトップ</h1>
    <p id="welcome"></p>
    <hr>
    ユーザ情報変更:<button onclick="buttonPressed()">x</button>
    <br>
    ツイート:<button onclick="buttonPressed2()">x</button>
</body>

</html>
