<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <script type="text/javascript" src="../lib/jquery.min.js"></script>
    <script type="text/javascript" src="../lib/osql.js"></script>

    <script>
        osql.requireLogin();//すべてのページに入れる．google認証をして，osql.connect()や，osql.getMe()を使えるようにしてくれる．

        $(document).ready(function () {
            execSelect();
        });

        async function execSelect() {
            var username = sessionStorage.getItem('username');
            var sql = `select * from Follows where fromid = '${username}'`;
            var objects = await osql.connect(sql);
            console.log(objects);
            var html = '';
            html = html + '<table border="1">';
            for (var i = 0; i < objects.length; i++) {
                html = html + '<tr>';
                var object = objects[i];
                html = html + '<td>' + object.toid + '</td>';
                html = html + '<td>' + '<button onclick="buttonPressed(\'' + object.fromid + '\')">削除</button>' + '</td>'
                html = html + '</tr>';
            }
            html = html + '</table>';
            document.getElementById('result').innerHTML = html;
        }

        function buttonPressed(name) {
            Followdelete(name);
        }

        async function Followdelete(name) {
            var ans = window.confirm('本当にいいんですね？');
            if (ans == false) return;

            var username = sessionStorage.getItem('username');
            var sql = `delete from Follows where fromid = "${username}" and toid = "${name}"`;
            var objects = await osql.connect(sql);
            execSelect();
            alert("消しました");
        }
    </script>

</head>

<body>
    <h1>Follows</h1>
    <p>あなたがフォローしている人</p>
    <hr>
    <p id="result">xxxx</p>
</body>

</html>
