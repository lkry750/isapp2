<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <script type="text/javascript" src="../lib/jquery.min.js"></script>
    <script type="text/javascript" src="../lib/osql.js"></script>

    <script>
        osql.requireLogin();//すべてのページに入れる．google認証をして，osql.connect()や，osql.getMe()を使えるようにしてくれる．

        function button1Pressed() {
            doSelect();
        }

        async function doSelect() {
            var sql = 'select * from Tweets order by time desc limit 20';
            var objects = await osql.connect(sql);
            console.log(objects);
            var html = '';
            html = html + '<table border="1">';
            for (var i = 0; i < objects.length; i++) {
                var object = objects[i];
                html = html + '<tr>';
                html = html + '<td>' + [i+1] + '<td>';
                html = html + '<td>' + object.name + '<td>';
                html = html + '<td>' + object.tweet + '<td>';
                html = html + '<td>' + object.time + '<td>';
                html = html + '<tr>';
            }
            html = html + '</table>';
            document.getElementById('result').innerHTML = html;
        }

        function button2Pressed() {
            doSearch();
        }

        async function doSearch() {
            var tweet = document.getElementById('tf1').value;

            var sql = `select * from Tweets where tweet like '%${tweet}%' order by time desc limit 20`;
            var objects = await osql.connect(sql);
            console.log(objects);
            var html = '';
            html = html + '<table border="1">';
            for (var i = 0; i < objects.length; i++) {
                var object = objects[i];
                html = html + '<tr>';
                html = html + '<td>' + [i+1] + '<td>';
                html = html + '<td>' + object.name + '<td>';
                html = html + '<td>' + object.tweet + '<td>';
                html = html + '<td>' + object.time + '<td>';
                html = html + '<tr>';
            }
            html = html + '</table>';
            document.getElementById('result').innerHTML = html;
        }
    </script>

</head>

<body>
    <h1>Tweets</h1>
    <br>
    tweetの検索ツール:<input id="tf1" type="textfield">
    <button onclick="button2Pressed()">X</button>
    <p>ツイート一覧</p>
    <button onclick="button1Pressed()">X</button>
    <hr>
    <p id="result">xxxx</p>
</body>

</html>
